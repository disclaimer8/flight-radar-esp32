[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    arduino-libraries/LiquidCrystal@^1.0.7

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
