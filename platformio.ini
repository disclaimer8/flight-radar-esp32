[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_qspi
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- TFT_eSPI setup for GC9A01 on ESP32-S3-Touch-LCD-1.28 ---
    -DUSER_SETUP_LOADED=1
    ; Force SPI2 (FSPI) by literal port number. Without this, S3 defaults
    ; SPI_PORT=FSPI(enum) which misresolves SPI_USER_REG to ~null -> boot crash
    ; (StoreProhibited in SET_BUS_WRITE_MODE) on first writecommand in init().
    -DUSE_FSPI_PORT
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=14
    -DTFT_BL=2
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=40000000
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.43
    h2zero/NimBLE-Arduino@^1.4.1
    tzapu/WiFiManager@^2.0.17

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
