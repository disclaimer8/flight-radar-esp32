; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_qspi
; module is 16 MB; default profile mis-declares 8 MB and falls back to DIO
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.flash_size = 16MB
build_flags = 
	-std=gnu++17
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DUSER_SETUP_LOADED=1
	-DUSE_FSPI_PORT
	-DGC9A01_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=240
	-DTFT_MISO=-1
	-DTFT_MOSI=11
	-DTFT_SCLK=10
	-DTFT_CS=9
	-DTFT_DC=8
	-DTFT_RST=14
	-DTFT_BL=2
	-DTFT_BACKLIGHT_ON=HIGH
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	; 80 MHz halves the 115 KB pushSprite (23->11.5 ms, ~36->~58 FPS sweep).
	; If the panel shows sparkle/artifacts, fall back to 60000000 or 40000000.
	-DSPI_FREQUENCY=80000000
lib_deps =
	bblanchon/ArduinoJson@^7.4.3
	bodmer/TFT_eSPI@^2.5.43
	; NimBLE 2.x: onWrite/connection callbacks take a NimBLEConnInfo& arg
	; (migrated 2026-06-18). Advertising/getValue/setMTU stay source-compatible.
	h2zero/NimBLE-Arduino@^2.5.0
	tzapu/WiFiManager@^2.0.17
	bitbank2/JPEGDEC@^1.8.4

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
lib_deps =
	bblanchon/ArduinoJson@^7.4.3
