[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    ; Parallel (non-PCF8574) HD44780 mode is not wired up in the firmware yet:
    ; it would require swapping the LiquidCrystal_I2C include/constructor in
    ; src/flight_ticker.ino for this lib, then uncommenting:
    ; arduino-libraries/LiquidCrystal@^1.0.7

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
