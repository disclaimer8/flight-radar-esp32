# Dependabot dependency updates.
# Only the Flutter companion app uses an ecosystem Dependabot supports (pub).
# ESP32 PlatformIO lib_deps (platformio.ini) are NOT supported by Dependabot
# (nor Renovate natively) — bump those manually. There are no GitHub Actions
# workflows in this repo yet, so no github-actions entry.
version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/companion"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
